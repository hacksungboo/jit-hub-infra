# gitops/values/eks-a/monitoring-stack-values.yaml
# EKS-A = 에이전트 (메트릭/로그를 온프레미스 중앙으로 전송)

kube-prometheus-stack:
  enabled: true

  prometheus:
    prometheusSpec:
      # 중앙 Prometheus 수신 시 클러스터 구분용 레이블
      externalLabels:
        cluster: eks-a
      # 온프레미스 중앙 Prometheus로 메트릭 전송 (Cloudflare Tunnel 경유)
      remoteWrite:
#        - url: "https://prometheus-ingest.ccmall.shop/api/v1/write"
        - url: "http://172.16.8.32:9090/api/v1/write"

  alertmanager:
    enabled: false

loki:
  enabled: false

lokiLoadBalancer:
  enabled: false

promtail:
  enabled: true
  config:
    clients:
      # 온프레미스 중앙 Loki로 로그 전송 (Cloudflare Tunnel 경유)
#      - url: "https://loki-ingest.ccmall.shop/loki/api/v1/push"
      - url: "http://172.16.8.34:3100/loki/api/v1/push"
        external_labels:
          cluster: eks-a
