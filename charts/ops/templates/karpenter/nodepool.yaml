
# NodePool: "어떤 스펙의 노드를 만들지" 정의
# v1beta1에서 NodePool은 cluster-scoped라 namespace 없음
{{- if .Values.karpenter.enabled }} 
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: {{ .Values.karpenter.nodePoolName }}

spec:
  template:
    metadata:
      labels:
        pool: {{ .Values.environment }}
        managed-by: karpenter

    spec:
      requirements:
        # 사용할 인스턴스 타입 (t3.small/medium/large 중 Karpenter가 자동 선택)
        - key: node.kubernetes.io/instance-type
          operator: In
          values: {{ .Values.karpenter.instanceTypes | toJson }}

        # On-Demand만 사용 (Spot 제외)
        - key: karpenter.sh/capacity-type
          operator: In
          values: {{ .Values.karpenter.capacityTypes | toJson }}

        - key: kubernetes.io/os
          operator: In
          values: ["linux"]

      # subnet/보안그룹/EBS 설정은 EC2NodeClass가 담당
      # v1beta1은 apiVersion, kind도 명시 필요
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: {{ index .Values.karpenter.nodeClassName 0 }}

  # 비용 제어: 이 NodePool이 만들 수 있는 총량
  limits:
    cpu: {{ .Values.karpenter.limits.cpu | quote }}
    memory: {{ .Values.karpenter.limits.memory }}

  # 노드 정리 정책
  disruption:
    consolidationPolicy: {{ .Values.karpenter.disruption.consolidationPolicy }}
    consolidateAfter: {{ .Values.karpenter.disruption.consolidateAfter }}
    expireAfter: {{ .Values.karpenter.disruption.expireAfter }}
{{- end }}