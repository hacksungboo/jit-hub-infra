{{- if .Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: traffic-service-scaler
  namespace: {{ .Values.keda.namespace | default "jit-hub" }}

spec:
  scaleTargetRef:
    name: traffic-service   # jit-hub-app의 Deployment 이름과 일치해야 합니다.
    kind: Deployment
  minReplicaCount: {{ .Values.keda.minReplicaCount | default 1 }}
  maxReplicaCount: {{ .Values.keda.maxReplicaCount | default 5 }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod | default 300 }}
  # Prometheus 연결 실패 시 최소 가용성 유지
  fallback:
    failureThreshold: {{ .Values.keda.fallback.failureThreshold | default 3 }}
    replicas: {{ .Values.keda.fallback.replicas | default 3 }}

  triggers:
  - type: prometheus
    metadata:
      # ArgoCD 배포 시 릴리스명이 접두사로 붙어 클러스터마다 이름이 달라짐
      serverAddress: {{ .Values.keda.serverAddress }}
      metricName: traffic_request_rate
      query: |
        sum(rate(http_requests_total{job="traffic-service"}[1m]))
      threshold: {{ .Values.keda.threshold | default "10" | quote }}
{{- end }}
