apiVersion: v2
name: jit-hub-app
description: JIT Hub Application Umbrella Chart
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: gateway
    version: 0.1.0
    repository: "file://charts/gateway"
    condition: gateway.enabled
  - name: auth
    version: 0.1.0
    repository: "file://charts/auth"
    condition: auth.enabled
  - name: weather
    version: 0.1.0
    repository: "file://charts/weather"
    condition: weather.enabled
  - name: traffic
    version: 0.1.0
    repository: "file://charts/traffic"
    condition: traffic.enabled
  - name: tourist
    version: 0.1.0
    repository: "file://charts/tourist"
    condition: tourist.enabled
  - name: sllm
    version: 0.1.0
    repository: "file://charts/sllm"
    condition: sllm.enabled
